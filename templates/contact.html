{%extends "base.html" %}

{%block title%}Contact_Us| {%endblock title%}

{%block body%}
 <div class="container-fluid mb-3 px-0" >
<img src=" https://plus.unsplash.com/premium_photo-1701760279195-89257eecdda7?q=80&w=1332&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="d-block w-100 mx-0" alt="..." />
 <h1 class="text-center">Contact Us </h1>  

 <div class="container my-5 ">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow p-4">
        

        <form method="POST" action="/contact/">
          {% csrf_token %}

         
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" id="Name" name="name" placeholder="Enter your name name" required>
            </div>
           
          </div>

        
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
            </div>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter phone number" required>
            </div>
          </div>

          
        

          
          <div class="mb-3">
            <label class="form-label d-block">Gender</label>
            <div class="form-check form-check-inline" id="male" >
              <input class="form-check-input" type="radio" name="gender">
              <label class="form-check-label">Male</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" id="gender" name="gender">
              <label class="form-check-label">Female</label>
            </div>
          </div>

         
    
          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4" id="message" name="message" placeholder="Write your message here"></textarea>
          </div>

          
         

         
          <div class="text-center">
            <button type="submit" class="btn btn-primary px-5">
              Submit
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>


 </div>

{%endblock body%}
