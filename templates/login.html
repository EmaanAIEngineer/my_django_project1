{%extends "base.html" %}

{% block body %}
<h2>Login</h2>
<form method="POST">
    {% csrf_token %}
    {% comment %} {{form.as_p}} {% endcomment %}
    <input type="text" name="username" placeholder="Username"><br><br>
    <input type="password" name="password" placeholder="Password"><br><br>
    <button type="submit">Login</button>
</form>
{% endblock %}
